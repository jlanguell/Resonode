name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit tests (pure-logic core)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12" ]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The tests in tests/test_core.py are pure-logic and import Discord and
      # faster-whisper lazily, so they only need numpy + python-dotenv. This
      # keeps CI fast and avoids the heavy voice/STT native dependencies.
      # To also validate the full install path, swap the line below for:
      #   pip install -r requirements.txt
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy python-dotenv

      - name: Run unit tests
        run: python tests/test_core.py
